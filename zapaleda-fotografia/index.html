<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Zapaleda Fotografía</title>
  <meta name="description" content="Fotógrafo profesional para eventos">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/style.css">

  

  
</head>

<body class="layout-clean">

  

  <main class="page">

    <!-- MODULES -->
    <section class="modules">
      
<section class="profile">

  <div class="avatar">
    <img src="assets/images/profile.jpg" alt="Zapaleda Fotografía">
    
    <span class="avatar-badge">
      <img src="assets/images/badge-whatsapp.jpg" alt="WhatsApp">
    </span>
    
  </div>

  <h1 class="profile-name">Zapaleda Fotografía</h1>
  <p class="profile-description">Fotografía profesional para eventos, bodas y retratos.</p>

</section>


<section class="lead-form">

  <form id="leadForm" class="lead-form-card">

    <input
      type="text"
      name="name"
      placeholder="Tu nombre"
      required
    >

    <input
      type="tel"
      name="whatsapp"
      placeholder="WhatsApp"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Correo (opcional)"
    >

    <!-- honeypot anti-bot -->
    <input
      type="text"
      name="website"
      style="display:none"
      tabindex="-1"
      autocomplete="off"
    >

    <button type="submit" class="btn primary">
      Enviar mi tarjeta a Zapaleda
    </button>


  </form>

  <!-- BOTÓN DESBLOQUEADO DESPUÉS DEL FORM -->

  <div id="vcardUnlock" style="display:none">

    <a
      class="btn btn-contact"
      href="assets/files/contacto.vcf"
      download
    >
      Guardar contacto de Zapaleda Fotografía
    </a>

  </div>

</section>


<section class="buttons">
<a href="https://wa.me/5215512345678" class="btn primary" target="_blank">WhatsApp</a><a href="https://www.instagram.com/zapaleda/" class="btn secondary" target="_blank">Ver portafolio</a>
</section>

    </section>

    <footer class="footer"></footer>

  </main>

  

  <script src="../assets/js/lead-form.js"></script>

</body>
</html>
