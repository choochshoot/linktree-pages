<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />

  <title>Test NFC</title>
  <meta name="description" content="Perfil de prueba">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  

  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/style.css">

  

  
</head>

<body class="layout-clean" data-slug="test-nfc">


  

  <main class="page">

    <!-- MODULES -->
    <section class="modules">
      
<section class="profile">

  <div class="avatar">
    <img src="assets/images/profile.webp" alt="Test NFC">
    
    <span class="avatar-badge">
      <img src="assets/images/badge-whatsapp.webp" alt="WhatsApp">
    </span>
    
  </div>

  <h1 class="profile-name">Test NFC</h1>
  <p class="profile-description">Perfil de prueba para validar sistema.</p>

</section>


<section class="lead-form">

  <form id="leadForm" class="lead-form-card">

    <input
      type="text"
      name="name"
      placeholder="Tu nombre"
      required
    >

    <input
      type="tel"
      name="whatsapp"
      placeholder="WhatsApp"
      required
    >

    <input
      type="email"
      name="email"
      placeholder="Correo (opcional)"
    >

    <!-- honeypot anti-bot -->
    <input
      type="text"
      name="website"
      style="display:none"
      tabindex="-1"
      autocomplete="off"
    >

    <button type="submit" class="btn primary">
      Enviar datos
    </button>

  </form>

  <!-- BOTÓN DESBLOQUEADO DESPUÉS DEL FORM -->

  <div id="vcardUnlock" style="display:none">

    <a
      class="btn btn-contact"
      href="assets/files/test-nfc.vcf"
      target="_blank"
      rel="noopener"
    >
      Guardar contacto de Test NFC
    </a>

  </div>

</section>


<section class="buttons">
<a href="https://example.com" class="btn secondary" target="_blank">Sitio web</a>
</section>

    </section>

    <footer class="footer"></footer>

  </main>

  

  <script src="../assets/js/lead-form.js"></script>

</body>
</html>
